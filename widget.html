<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namaz Vakitleri Widget</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&display=swap');
        body { font-family: 'Outfit', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; background: transparent; }
        :root { --bg: transparent; --text: #333; --border: #ddd; --box-bg: rgba(0,0,0,0.03); --accent: #38bdf8; --iftar-color: #10b981; }
        .theme-dark { --bg: #1e293b; --text: #f8fafc; --border: #334155; --box-bg: rgba(0,0,0,0.2); --accent: #38bdf8; --iftar-color: #10b981;}
        .theme-light { --bg: #ffffff; --text: #0f172a; --border: #e2e8f0; --box-bg: #f8fafc; --accent: #2563eb; --iftar-color: #10b981;}
        .theme-sepia { --bg: #fffbf0; --text: #4a3c31; --border: #d6caba; --box-bg: rgba(0,0,0,0.03); --accent: #b45309; --iftar-color: #047857;}
        .theme-lavender { --bg: #f3f0ff; --text: #312e81; --border: #e0e7ff; --box-bg: #ffffff; --accent: #8b5cf6; --iftar-color: #10b981;}
        .theme-oled { --bg: #000000; --text: #e0e0e0; --border: #333333; --box-bg: #111111; --accent: #fbbf24; --iftar-color: #fbbf24;}
        .theme-dark-forest { --bg: #0b2f1f; --text: #e2f1e8; --border: #1a4d33; --box-bg: rgba(0,0,0,0.2); --accent: #fcd34d; --iftar-color: #10b981;}
        .theme-sunrise { --bg: #fff7ed; --text: #9a3412; --border: #fed7aa; --box-bg: #ffedd5; --accent: #ea580c; --iftar-color: #b45309;}
        .theme-ocean { --bg: #0c4a6e; --text: #e0f2fe; --border: #075985; --box-bg: rgba(0,0,0,0.2); --accent: #38bdf8; --iftar-color: #10b981;}
        .theme-terracotta { --bg: #2e1008; --text: #ffedd5; --border: #431407; --box-bg: rgba(0,0,0,0.2); --accent: #fdba74; --iftar-color: #fb923c;}
        .theme-midnight { --bg: #171717; --text: #fafafa; --border: #262626; --box-bg: rgba(255,255,255,0.05); --accent: #818cf8; --iftar-color: #2dd4bf;}
        .theme-transparent { --bg: transparent; --text: inherit; --border: transparent; --box-bg: rgba(128,128,128,0.1); --accent: #10b981; --iftar-color: #10b981;}
        .widget-wrapper { width: 100%; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; align-items: center; padding: 15px; border-radius: 12px; background-color: var(--bg); color: var(--text); border: 1px solid var(--border); }
        .countdown-area { text-align: center; margin-bottom: 10px; width: 100%; }
        .countdown-title { font-size: 0.8em; font-weight: 700; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px;}
        .countdown-timer { font-size: 3em; font-weight: 900; line-height: 1; color: var(--accent); font-variant-numeric: tabular-nums; }
        .color-green { color: var(--iftar-color) !important; }
        .times-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; flex-grow: 1; }
        .time-box { display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--box-bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 4px; transition: 0.3s; }
        .time-name { font-size: 0.65em; font-weight: 700; opacity: 0.6; text-transform: uppercase; margin-bottom: 2px;}
        .time-val { font-size: 1.2em; font-weight: 800; font-variant-numeric: tabular-nums;}
        .past-time { opacity: 0.35; filter: grayscale(1); }
        .active-time { background: linear-gradient(135deg, var(--accent), var(--iftar-color)); border: none !important; color: #fff !important; transform: scale(1.03); box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .active-time .time-name { opacity: 0.9; color: #fff; }
        .theme-light .active-time { background: var(--accent); }
        .theme-sepia .active-time { background: linear-gradient(135deg, #b45309, #047857); }
        .footer-link { font-size: 0.7em; opacity: 0.4; color: inherit; text-decoration: none; margin-top: 10px; font-weight: 600; }
        .footer-link:hover { opacity: 1; text-decoration: underline; }
    </style>
</head>
<body>
    <audio id="vakitSesi" preload="auto"></audio>
    <div class="widget-wrapper theme-dark" id="widgetBox">
        <div class="countdown-area">
            <div class="countdown-title" id="vakitAdi">Yükleniyor...</div>
            <div class="countdown-timer" id="kalanSure">00:00:00</div>
        </div>
        <div class="times-grid" id="timesGrid"></div>
        <a href="https://webimsakiye.com.tr" target="_blank" class="footer-link">webimsakiye.com.tr</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const ilceId = params.get('ilce') || '583'; 
        const tema = params.get('tema') || 'dark';
        const ses = params.get('ses') || 'none';
        document.getElementById('widgetBox').className = `widget-wrapper theme-${tema}`;
        
        const sesElementi = document.getElementById('vakitSesi');
        const sesDosyalari = { "sound_bell": "https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3", "sound_soft": "https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" };
        if (ses !== 'none' && sesDosyalari[ses]) sesElementi.src = sesDosyalari[ses];

        let vakitler = [];
        let yarinImsakDk = 0;
        let sesCalindi = false;
        let aktifVakitId = null;

        function toMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        async function vakitleriGetir() {
            try {
                const res = await fetch('https://ezanvakti.emushaf.net/vakitler/' + ilceId);
                const data = await res.json();
                
                // --- KRİTİK DÜZELTME BURASI ---
                // Cihazın bugünkü tarihini tam olarak "GG.AA.YYYY" formatında alıyoruz
                const now = new Date();
                const todayStr = String(now.getDate()).padStart(2, '0') + '.' + 
                                 String(now.getMonth() + 1).padStart(2, '0') + '.' + 
                                 now.getFullYear();

                // API'den gelen veriler içinde doğrudan bugünün tarihini arıyoruz
                let bugunIndex = data.findIndex(d => d.MiladiTarihKisa === todayStr);
                
                // Eğer bulamazsa (API çökmüş veya ay bitmiş olabilir) ilk veriyi al
                if (bugunIndex === -1) bugunIndex = 0; 
                
                const bugun = data[bugunIndex];
                const yarin = data[bugunIndex + 1] || data[bugunIndex];
                // ------------------------------

                vakitler = [
                    { id: 'imsak', ad: 'İmsak', dk: toMinutes(bugun.Imsak), str: bugun.Imsak },
                    { id: 'gunes', ad: 'Güneş', dk: toMinutes(bugun.Gunes), str: bugun.Gunes },
                    { id: 'ogle', ad: 'Öğle', dk: toMinutes(bugun.Ogle), str: bugun.Ogle },
                    { id: 'ikindi', ad: 'İkindi', dk: toMinutes(bugun.Ikindi), str: bugun.Ikindi },
                    { id: 'aksam', ad: 'Akşam', dk: toMinutes(bugun.Aksam), str: bugun.Aksam },
                    { id: 'yatsi', ad: 'Yatsı', dk: toMinutes(bugun.Yatsi), str: bugun.Yatsi }
                ];

                yarinImsakDk = toMinutes(yarin.Imsak) + 1440;

                const grid = document.getElementById('timesGrid');
                grid.innerHTML = '';
                vakitler.forEach(v => {
                    grid.innerHTML += `<div class="time-box" id="box-${v.id}"><div class="time-name">${v.ad}</div><div class="time-val">${v.str}</div></div>`;
                });

                startTimer();
            } catch (e) { document.getElementById('vakitAdi').innerText = "Hata!"; }
        }

        function startTimer() {
            const vakitAdiEl = document.getElementById('vakitAdi');
            const kalanSureEl = document.getElementById('kalanSure');
            const timeBoxes = document.querySelectorAll('.time-box');

            setInterval(() => {
                const now = new Date();
                const simdiDk = now.getHours() * 60 + now.getMinutes();
                const simdiSn = now.getSeconds();

                let siradaki = vakitler.find(v => v.dk > simdiDk);
                let hedefDk, ad, yeniAktifId;

                if (siradaki) {
                    hedefDk = siradaki.dk;
                    ad = siradaki.ad;
                    yeniAktifId = siradaki.id;
                } else {
                    hedefDk = yarinImsakDk;
                    ad = "İmsak";
                    yeniAktifId = 'imsak';
                }

                if (aktifVakitId !== yeniAktifId) {
                    aktifVakitId = yeniAktifId;
                    vakitAdiEl.innerText = ad + " Vaktine";

                    timeBoxes.forEach(b => {
                        b.classList.remove('active-time', 'past-time');
                        const boxId = b.id.replace('box-', '');
                        const boxVakit = vakitler.find(v => v.id === boxId);

                        if (boxId === yeniAktifId) {
                            b.classList.add('active-time');
                        } else if (boxVakit && simdiDk >= boxVakit.dk && siradaki) {
                            b.classList.add('past-time');
                        } else if (!siradaki && boxId !== 'imsak') {
                            b.classList.add('past-time');
                        }
                    });
                }

                let kalanSaniye = (hedefDk * 60) - (simdiDk * 60 + simdiSn);
                if (kalanSaniye < 0) kalanSaniye = 0;

                const h = String(Math.floor(kalanSaniye / 3600)).padStart(2, '0');
                const m = String(Math.floor((kalanSaniye % 3600) / 60)).padStart(2, '0');
                const s = String(kalanSaniye % 60).padStart(2, '0');

                kalanSureEl.innerText = `${h}:${m}:${s}`;
                
                const isGreen = (ad === 'Akşam' || ad === 'İmsak');
                const expectedClass = isGreen ? 'countdown-timer color-green' : 'countdown-timer';
                if (kalanSureEl.className !== expectedClass) {
                    kalanSureEl.className = expectedClass;
                }

                if (h === "00" && m === "00" && s === "00" && !sesCalindi) {
                    if (ses !== 'none') sesElementi.play().catch(() => {});
                    sesCalindi = true;
                    setTimeout(() => { sesCalindi = false; location.reload(); }, 2000);
                }
            }, 1000);
        }

        vakitleriGetir();
    </script>
</body>
</html>
