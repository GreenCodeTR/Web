<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webİmsakiye - Namaz Vakti Widget Servisi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        /* OLUŞTURUCU SAYFASI İÇİN DİNAMİK TEMALAR */
        :root {
            --bg-color: #0f172a; --panel-bg: #1e293b; --text-color: #f8fafc;
            --text-muted: #94a3b8; --border-color: #334155; --accent: #38bdf8;
            --input-bg: #0f172a; --copy-text: #0f172a;
        }
        [data-theme="light"] {
            --bg-color: #f1f5f9; --panel-bg: #ffffff; --text-color: #0f172a;
            --text-muted: #64748b; --border-color: #cbd5e1; --accent: #0ea5e9;
            --input-bg: #f8fafc; --copy-text: #ffffff;
        }
        [data-theme="sepia"] {
            --bg-color: #f4ecd8; --panel-bg: #fffbf0; --text-color: #4a3c31;
            --text-muted: #8c7b6b; --border-color: #d6caba; --accent: #b45309;
            --input-bg: #f4ecd8; --copy-text: #ffffff;
        }
        [data-theme="oled"] {
            --bg-color: #000000; --panel-bg: #111111; --text-color: #e0e0e0;
            --text-muted: #888888; --border-color: #333333; --accent: #fbbf24;
            --input-bg: #000000; --copy-text: #000000;
        }

        body {
            font-family: 'Outfit', sans-serif; background-color: var(--bg-color); color: var(--text-color);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            transition: all 0.3s ease;
        }

        .top-bar {
            width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--accent); font-size: 2.5em; margin-bottom: 10px; font-weight: 800;}
        .header p { color: var(--text-muted); font-size: 1.1em; max-width: 600px; margin: 0 auto;}

        /* BOZULMAYI ÖNLEYEN GRID DÜZENİ */
        .container {
            width: 100%; max-width: 1000px; display: grid; 
            grid-template-columns: minmax(300px, 1fr) 2fr; gap: 30px;
            align-items: start;
        }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } .top-bar { flex-direction: column; gap: 15px; } }

        .panel {
            background: var(--panel-bg); border-radius: 16px; padding: 25px;
            border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 { color: var(--text-color); font-size: 1.2em; margin-top: 0; margin-bottom: 20px; border-bottom: 1px dashed var(--border-color); padding-bottom: 10px; }
        label { display: block; font-size: 0.85em; color: var(--text-muted); margin-bottom: 5px; font-weight: 600; }
        
        select, input {
            width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px;
            border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color);
            font-family: 'Outfit'; font-size: 1em; box-sizing: border-box; outline: none; transition: border 0.2s;
        }
        select:focus, input:focus { border-color: var(--accent); }

        .page-theme-box { display: flex; align-items: center; gap: 10px; }
        .page-theme-box label { margin: 0; color: var(--text-color); }
        .page-theme-box select { margin: 0; padding: 8px 15px; width: auto; font-weight: bold; }

        /* KONUM BUL BUTONU VE GRUP AYARI */
        .location-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .location-group select { margin-bottom: 0; flex: 1; }
        .gps-btn {
            display: flex; align-items: center; justify-content: center;
            background: var(--input-bg); border: 1px solid var(--border-color);
            color: var(--text-color); border-radius: 8px; cursor: pointer;
            width: 48px; transition: 0.2s; font-size: 1.2em; padding: 0; margin-bottom: 0;
        }
        .gps-btn:hover { border-color: var(--accent); background: var(--panel-bg); }

        /* KUTULARIN HİZASINI DÜZELTEN AYAR: align-items: flex-end; EKLENDİ */
        .size-inputs { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end; }
        .size-inputs div { flex: 1; display: flex; flex-direction: column; }
        .size-inputs input { margin-bottom: 0; }
        
        .reset-size-btn {
            width: 100%; padding: 8px; font-size: 0.8em; background: transparent; color: var(--accent);
            border: 1px dashed var(--accent); border-radius: 6px; cursor: pointer; margin-bottom: 20px; transition: 0.2s; font-weight: bold;
        }
        .reset-size-btn:hover { background: rgba(56, 189, 248, 0.1); }

        /* TAŞMAYI ÖNLEYEN ÖNİZLEME KUTUSU */
        .preview-box {
            background: var(--bg-color); border: 2px dashed var(--border-color); border-radius: 12px;
            padding: 20px; display: flex; justify-content: center; align-items: center;
            margin-bottom: 20px; min-height: 250px; overflow: auto; max-width: 100%;
        }

        .preview-box iframe { max-width: 100%; } 

        .code-area {
            width: 100%; height: 100px; background: var(--bg-color); color: var(--accent);
            border: 1px solid var(--border-color); border-radius: 8px; padding: 12px;
            font-family: monospace; font-size: 0.9em; resize: none; box-sizing: border-box; outline: none;
        }

        .copy-btn {
            width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 1em;
            border: none; cursor: pointer; background: var(--accent); color: var(--copy-text); margin-top: 10px; transition: 0.2s;
        }
        .copy-btn:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15);}
        .copy-btn:active { transform: scale(0.98); }

        .back-btn {
            display: inline-block; padding: 10px 20px; background: var(--panel-bg); color: var(--text-color);
            text-decoration: none; border-radius: 8px; font-weight: bold;
            transition: 0.2s; border: 1px solid var(--border-color);
        }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body data-theme="dark">

    <div class="top-bar">
        <a href="https://webimsakiye.com.tr" class="back-btn">⬅ Ana Siteye Dön</a>
        
        <div class="page-theme-box">
            <label>Sayfa Görünümü:</label>
            <select id="pageThemeSelect" onchange="changePageTheme()">
                <option value="dark">Gece Mavisi</option>
                <option value="light">Aydınlık (Beyaz)</option>
                <option value="sepia">Sepya (Göz Yormayan)</option>
                <option value="oled">Kömür Siyahı (OLED)</option>
            </select>
        </div>
    </div>

    <div class="header">
        <h1>Sitenize Vakit Ekleyin 🚀</h1>
        <p>Aşağıdaki ayarları yaparak tamamen ücretsiz, reklamsız ve Diyanet uyumlu namaz vakti aracınızı oluşturun. Kodu kopyalayıp sitenize yapıştırmanız yeterli.</p>
    </div>

    <div class="container">
        <!-- SOL PANEL: AYARLAR -->
        <div class="panel">
            <h2>⚙️ Widget Ayarları</h2>
            
            <label>📍 Şehir</label>
            <div class="location-group">
                <select id="citySelect" onchange="loadDistricts()">
                    <option value="">Şehirler Yükleniyor...</option>
                </select>
                <button class="gps-btn" onclick="geolocateUser()" title="Otomatik Konum Bul">📍</button>
            </div>

            <label>🏘️ İlçe</label>
            <select id="districtSelect" onchange="updateWidgetCode()">
                <option value="">Önce Şehir Seçin</option>
            </select>

            <label>🎨 Widget Rengi (Teması)</label>
            <select id="themeSelect" onchange="updateWidgetCode()">
                <optgroup label="Açık Temalar">
                    <option value="light">Klasik Beyaz</option>
                    <option value="sepia">Sepya (Krem)</option>
                    <option value="lavender">Lavanta (Soft Mor)</option>
                    <option value="sunrise">Gündoğumu (Sıcak)</option>
                </optgroup>
                <optgroup label="Koyu Temalar">
                    <option value="dark" selected>Gece Mavisi</option>
                    <option value="oled">Kömür Siyahı</option>
                    <option value="dark-forest">Koyu Orman</option>
                    <option value="ocean">Deniz Mavisi</option>
                    <option value="terracotta">Kiremit</option>
                    <option value="midnight">Gece Yarısı</option>
                </optgroup>
                <option value="transparent">Şeffaf (Arka Plansız)</option>
            </select>

            <div class="size-inputs">
                <div>
                    <label>Genişlik </label>
                    <input type="text" id="widgetWidth" value="550px" oninput="updateWidgetCode()">
                </div>
                <div>
                    <label>Yükseklik </label>
                    <input type="text" id="widgetHeight" value="250px" oninput="updateWidgetCode()">
                </div>
            </div>
            <button class="reset-size-btn" onclick="resetSize()">🔄 Varsayılan Boyut (550x250)</button>

            <label>🔔 Uyarı Sesi (Vakit Girdiğinde)</label>
            <select id="soundSelect" onchange="updateWidgetCode()">
                <option value="none">Ses Yok (Sessiz)</option>
                <option value="sound_bell">Klasik Zil</option>
                <option value="sound_soft">Yumuşak Çan</option>
                <option value="sound_modern">Modern Uyarı</option>
                <option value="sound_ding">Ding-Dong</option>
                <option value="sound_beep">Dijital Beep</option>
                <option value="sound_chime">Rüzgar Çanı</option>
                <option value="sound_crystal">Kristal Tınlama</option>
                <option value="sound_piano">Soft Piyano</option>
                <option value="sound_echo">Eko Uyarı</option>
                <option value="sound_retro">Retro Oyun</option>
            </select>
        </div>

        <!-- SAĞ PANEL: ÖNİZLEME VE KOD -->
        <div class="panel">
            <h2>👁️ Canlı Önizleme</h2>
            <div class="preview-box">
                <!-- Gerçek widget iframe olarak burada görünecek -->
                <iframe id="previewFrame" src="" style="border:none; border-radius:12px; transition: width 0.3s, height 0.3s;"></iframe>
            </div>

            <h2>💻 Yerleştirme Kodu</h2>
            <label>Bu kodu HTML sitenizin istediğiniz yerine yapıştırın:</label>
            <textarea class="code-area" id="embedCode" readonly></textarea>
            <button class="copy-btn" onclick="copyCode()">📋 Kodu Kopyala</button>
        </div>
    </div>

    <script>
        function changePageTheme() {
            const selectedTheme = document.getElementById('pageThemeSelect').value;
            document.body.setAttribute('data-theme', selectedTheme);
            localStorage.setItem('builder_page_theme', selectedTheme);
        }

        const savedPageTheme = localStorage.getItem('builder_page_theme') || 'dark';
        document.body.setAttribute('data-theme', savedPageTheme);
        document.getElementById('pageThemeSelect').value = savedPageTheme;

        // Varsayılan boyuta döndürme fonksiyonu
        function resetSize() {
            document.getElementById('widgetWidth').value = "550px";
            document.getElementById('widgetHeight').value = "250px";
            updateWidgetCode();
        }

        async function loadCities() {
            try {
                const res = await fetch('https://ezanvakti.emushaf.net/sehirler/2');
                const cities = await res.json();
                const citySelect = document.getElementById('citySelect');
                citySelect.innerHTML = '';
                
                cities.forEach(c => {
                    let opt = document.createElement('option');
                    opt.value = c.SehirID;
                    opt.text = c.SehirAdi;
                    citySelect.appendChild(opt);
                });
                
                citySelect.value = "583";
                await loadDistricts();
            } catch(e) { console.log("Şehirler yüklenemedi", e); }
        }

        async function loadDistricts() {
            const cityId = document.getElementById('citySelect').value;
            try {
                const res = await fetch('https://ezanvakti.emushaf.net/ilceler/' + cityId);
                const districts = await res.json();
                const distSelect = document.getElementById('districtSelect');
                distSelect.innerHTML = '';
                
                districts.forEach(d => {
                    let opt = document.createElement('option');
                    opt.value = d.IlceID;
                    opt.text = d.IlceAdi;
                    distSelect.appendChild(opt);
                });

                updateWidgetCode();
            } catch(e) { console.log("İlçeler yüklenemedi", e); }
        }

        // --- YENİ EKLENEN GPS FONKSİYONU ---
        async function geolocateUser() {
            if (!navigator.geolocation) return alert("Tarayıcınız konum desteklemiyor.");
            const btn = document.querySelector('.gps-btn'); 
            const originalIcon = btn.innerText;
            btn.innerText = "⏳";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                    const data = await res.json();
                    const province = data.address.province || data.address.city || data.address.town;
                    
                    if(province) {
                        const citySelect = document.getElementById('citySelect');
                        const targetCity = province.replace(' Province', '').toLocaleUpperCase('tr-TR');
                        for(let i=0; i<citySelect.options.length; i++) {
                            if(citySelect.options[i].text.includes(targetCity)) {
                                citySelect.selectedIndex = i; 
                                await loadDistricts();
                                alert("Konum başarıyla eşleşti: " + targetCity); 
                                break;
                            }
                        }
                    }
                } catch(e) { 
                    alert("Konum ağdan çözümlenemedi."); 
                }
                btn.innerText = originalIcon;
            }, () => { 
                alert("Konum izni verilmedi veya zaman aşımına uğradı."); 
                btn.innerText = originalIcon; 
            });
        }
        // ------------------------------------

        function updateWidgetCode() {
            const ilceId = document.getElementById('districtSelect').value;
            const tema = document.getElementById('themeSelect').value;
            const ses = document.getElementById('soundSelect').value;
            let w = document.getElementById('widgetWidth').value.trim();
            let h = document.getElementById('widgetHeight').value.trim();
            
            if(!ilceId) return;
            if(!w) w = "550px";
            if(!h) h = "250px";

            const widgetUrl = `https://webimsakiye.com.tr/widget.html?ilce=${ilceId}&tema=${tema}&ses=${ses}`;
            const localPreviewUrl = `./widget.html?ilce=${ilceId}&tema=${tema}&ses=${ses}`;

            const iframe = document.getElementById('previewFrame');
            if (iframe.src.includes(localPreviewUrl)) {
                iframe.style.width = w;
                iframe.style.height = h;
            } else {
                iframe.src = localPreviewUrl;
                iframe.style.width = w;
                iframe.style.height = h;
            }

            const iframeCode = `<iframe src="${widgetUrl}" width="${w}" height="${h}" style="border:none; border-radius:12px; overflow:hidden;" title="Namaz Vakti"></iframe>`;
            document.getElementById('embedCode').value = iframeCode;
        }

        function copyCode() {
            const codeArea = document.getElementById('embedCode');
            codeArea.select();
            document.execCommand('copy');
            const btn = document.querySelector('.copy-btn');
            
            btn.innerText = "✅ Başarıyla Kopyalandı!";
            btn.style.background = "#10b981";
            btn.style.color = "#fff";
            
            setTimeout(() => {
                btn.innerText = "📋 Kodu Kopyala";
                btn.style.background = "";
                btn.style.color = "";
            }, 2500);
        }

        window.onload = loadCities;
    </script>
</body>
</html>
